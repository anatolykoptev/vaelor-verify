name: preflight

# Pre-merge build/test gate. Runs on GitHub-hosted `ubuntu-24.04-arm` — free
# unlimited minutes for public repos, and arm64 matches the ARM prod box.
# Moved off the self-hosted krolik runner 2026-07-14. The old dedicated
# runner (krolik-go-code-verify) was registered but had no systemd unit, so
# every PR run queued forever against an offline runner — this migration
# also simply un-breaks CI here. GitHub-hosted runners sandbox fork PRs in
# throwaway VMs, so the old same-repo guard is gone with the runner.
#
# No ephemeral-postgres step — this service has no database. `make preflight`
# is gofmt + vet + build + test + govulncheck only (govulncheck self-installs
# via the Makefile).

on:
  pull_request:

concurrency:
  group: preflight-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  preflight:
    runs-on: ubuntu-24.04-arm
    # A hung job must never linger for GitHub's 6h default.
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v5
        with:
          # Fleet policy: CI runs the latest patched toolchain (go.mod is the
          # minimum, not the pin). govulncheck gates on stdlib CVEs fixed in
          # patch releases — seen live: GO-2026-4970 in os@go1.26.4, fixed
          # in go1.26.5 while go.mod pinned 1.26.4.
          go-version: stable

      # #53: gostall — static analysis for lock-order inversions, missing
      # unlocks, WaitGroup misuse, channel deadlocks, livelocks, starvation.
      - name: Ensure gostall v1.0.0 (pinned)
        run: |
          GOBIN="$(go env GOPATH)/bin"
          if ! go version -m "$GOBIN/gostall" 2>/dev/null | grep -q "erfanmomeniii/gostall.*v1.0.0"; then
            go install github.com/erfanmomeniii/gostall/cmd/gostall@v1.0.0
          fi

      - name: make preflight
        run: make preflight
